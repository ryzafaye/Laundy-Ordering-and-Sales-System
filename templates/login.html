<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laundrify - Staff Login</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>

    <div class="login-container">
        
        <div class="brand-panel">
            <div class="logo-wrapper">
                <img src="C:\Users\Arabella\GitHub\Laundy-Ordering-and-Sales-System\images\laundrify_logo.png" alt="Laundrify Logo" class="logo-img">
            </div>
            <h2>LAUNDRIFY</h2>
            <p>Smart Laundry Management System</p>
        </div>

        <main class="form-panel">
            <h1>Welcome to Laundrify</h1>
            <p class="form-subtitle">Ready for today's orders? Sign in below.</p>

            <div class="form-element">
                <label for="username">Employee ID / Email</label>
                <input type="text" id="username" placeholder="e.g., staff-001" required>
            </div>

            <div class="form-element">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox"> Remember Me
                </label>
                <a href="#" class="forgot-pass">Forgot Password?</a>
            </div>

            <a href="dashboard.html" style="text-decoration: none; display: block; width: 100%;">
                <button type="button" class="btn-ui btn-success">SIGN IN</button>
            </a>
            
        </main>

    </div>

</body>
</html>
