<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laundrify - Staff Login</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>

    <div class="login-container">
        
        <div class="brand-panel">
            <div class="logo-wrapper">
                <img src="../images/laundrify_logo.png" alt="Laundrify Logo" class="logo-img">
            </div>
            <h2>LAUNDRIFY</h2>
            <p>Smart Laundry Management System</p>
        </div>

        <main class="form-panel">
            <h1>Welcome to Laundrify</h1>
            <p class="form-subtitle">Ready for today's orders? Sign in below.</p>

            <form action="dashboard.html" method="GET">
                <div class="form-element">
                    <label for="empid">Employee ID</label>
                    <input type="text" id="empid" name="empid" placeholder="e.g., EMP-001" required>
                </div>

                <div class="form-element">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-ui btn-success" style="margin-top: 15px;">
                    SIGN IN
                </button>
            </form>

            <div style="text-align: center; margin-top: 30px;">
                <p style="font-size: 0.9em; color: #7f8c8d;">
                    New staff? 
                    <a href="register.html" style="color: #df1e6a; text-decoration: none; font-weight: bold;">
                        Create an account
                    </a>
                </p>
            </div>
            
        </main>

    </div>

</body>
</html>
