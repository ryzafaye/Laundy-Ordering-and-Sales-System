<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../static/dashboard-style.css">
    <link rel="stylesheet" href="../static/admin-settings.css">
    <link rel="stylesheet" href="../static/admin-staff.css">

    <title>Admin Settings - Laundrify</title>
</head>
<body>
    <header class="top-navbar">
        <div class="brand-wrapper">
            <img src="../static/images/laundrify_logo.png" alt="Logo" class="nav-logo-img">
            <div class="logo-text">LAUNDRIFY | ADMIN</div>
        </div>
        <div class="date-display" id="liveDate">Loading date...</div>
    </header>
    
    <div class="app-frame">
        <aside class="sidebar-nav">
            <a href="admin-dashboard.html" class="nav-link">
                <img src="../static/images/dashboard-admin.png" class="nav-icon" alt="">Dashboard</a>
            <a href="admin-staff.html" class="nav-link">
                <img src="../static/images/employee.png" class="nav-icon" alt="">Manage Staff</a>
            <a href="admin-order.html" class="nav-link">
                <img src="../static/images/booking.png" class="nav-icon" alt="">All Orders</a>
            <a href="admin-reports.html" class="nav-link">
                <img src="../static/images/reports.png" class="nav-icon" alt="">Financial Reports</a>
            <a href="admin-settings.html" class="nav-link active">
                <img src="../static/images/settings.png" class="nav-icon" alt="">Settings</a>

            <div class="logout-anchor">
                <a href="login.html" class="nav-link logout-btn">
                    <img src="../static/images/logout-admin.png" class="nav-icon" alt="">Log Out
                </a>
            </div>
        </aside>


<main class="workspace">
    <div class="dashboard-header">
        <h1>System Settings</h1>
    </div>

    <div class="settings-grid">
        <div class="ui-card card-accent-brand">
            <h3>Business Profile</h3>
            <div class="form-group">
                <label>Branch Name</label>
                <input type="text" class="form-control" value="Laundrify Main Branch">
            </div>
            <div class="form-group">
                <label>Contact Number</label>
                <input type="text" class="form-control" value="0917-123-4567">
            </div>
        </div>

        <div class="ui-card card-accent-info">
            <h3>Operational Defaults</h3>
            <div class="form-group">
                <label>Tax Rate (%)</label>
                <input type="number" class="form-control" value="12">
            </div>
            <div class="form-group">
                <label>Currency</label>
                <select class="form-control">
                    <option>PHP (₱)</option>
                    <option>USD ($)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="ui-card card-accent-warning">
        <h3>Security & Maintenance</h3>
        <div class="form-row">
            <div class="form-group">
                <label>Admin Email</label>
                <input type="email" class="form-control" value="admin@laundrify.ph">
            </div>
            <div class="form-group">
                <label>Session Timeout (Min)</label>
                <input type="number" class="form-control" value="30">
            </div>
        </div>
        
        <div class="settings-footer">
            <button class="btn-cancel">Download Backup</button>
            <button class="btn-text-delete">Clear Transaction Logs</button>
        </div>
    </div>

    <div class="ui-card card-accent-success">
        <h3>System Health</h3>
        <div class="health-monitor">
            <div class="health-item">
                <span>Database Status</span> 
                <span class="text-color-success">Online (99.9% uptime)</span>
            </div>
            <div class="health-item">
                <span>Storage Used</span> 
                <span>450MB / 2GB</span>
            </div>
        </div>
    </div>

    <div style="text-align: right;">
    <button class="btn-cancel" style="width: auto; padding: 12px 30px; margin-left: 10px;">Discard Changes</button>
    <button class="btn-register" style="width: auto; padding: 12px 30px; margin-left: 10px;">Save Settings</button>
</div>
    
</main>

        <script>
    document.querySelector('.btn-register').addEventListener('click', function() {
        alert('System settings updated successfully!');
        // You would add your actual backend save logic here
    });
</script>

        <script>
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('liveDate').textContent = new Date().toLocaleDateString('en-US', dateOptions);
    
        </script>
</body>
</html>
