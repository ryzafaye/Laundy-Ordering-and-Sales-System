<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laundrify - Create Account</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>

    <div class="login-container">
        
        <div class="brand-panel">
            <div class="logo-wrapper">
                <img src="../images/laundrify_logo.png" alt="Laundrify Logo" class="logo-img">
            </div>
            <h2>LAUNDRIFY</h2>
            <p>Smart Laundry Management System</p>
        </div>

        <main class="form-panel">
            <h1>Create an Account</h1>
            <p class="form-subtitle">Register to access the management system.</p>

            <form action="login.html" method="GET">
                
                <div style="display: flex; gap: 15px;">
                    <div class="form-element" style="flex: 1;">
                        <label for="firstname">First Name</label>
                        <input type="text" id="firstname" name="firstname" placeholder="Juan" required>
                    </div>
                    <div class="form-element" style="flex: 1;">
                        <label for="lastname">Last Name</label>
                        <input type="text" id="lastname" name="lastname" placeholder="Dela Cruz" required>
                    </div>
                </div>

                <div class="form-element">
                    <label for="position">Position</label>
                    <select id="position" name="position" style="width: 100%; padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.95rem; outline: none; color: #333;" required>
                        <option value="" disabled selected>Select your role</option>
                        <option value="Staff">Laundry Staff</option>
                        <option value="Admin">Shop Admin</option>
                    </select>
                </div>

                <div class="form-element">
                    <label for="password">Set Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-ui btn-success" style="margin-top: 10px;">
                    REGISTER ACCOUNT
                </button>
            </form>

            <div style="text-align: center; margin-top: 25px;">
                <p style="font-size: 0.9em; color: #7f8c8d;">
                    Already have an account? 
                    <a href="login.html" style="color: #df1e6a; text-decoration: none; font-weight: bold;">
                        Sign in here
                    </a>
                </p>
            </div>
            
        </main>

    </div>

</body>
</html>
