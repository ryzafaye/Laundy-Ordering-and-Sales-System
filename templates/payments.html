        </aside>
        <main class="workspace">
            <div id="view-payments" class="view-panel active-view">
                <h1>Customer Payment History</h1>
                <div class="ui-card">
                    <table class="basket-table">
                        <thead>
                            <tr><th>Payment ID</th><th>Order ID</th><th>Method</th><th>Status</th><th>Amount Paid</th></tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>PAY-901</td>
                                <td>ORD-1024</td>
                                <td>Cash</td>
                            <td>
                                <select class="status-select">
                                    <option value="paid">Paid</option>
                                    <option value="pending">Pending</option>
                                    <option value="refunded">Refunded</option>
                                </select>
                            </td>
                            <td>₱250.00</td>
                        </tr>

                            <tr>
                                <td>PAY-902</td>
                                <td>ORD-1023</td>
                                <td>GCash</td>
                            <td>
                                <select class="status-select">
                                    <option value="paid">Paid</option>
                                    <option value="pending">Pending</option>
                                    <option value="refunded">Refunded</option>
                                </select>
                            </td>
                            <td>₱120.00</td>
                        </tr>

                        </tbody>
                    </table>


                        <script>
                        document.querySelectorAll('.status-select').forEach(select => {
                            // Set initial color based on initial selection
                            updateColor(select);

                            // Update when changed
                            select.addEventListener('change', function() {
                                updateColor(this);
                            });
                        });

                        function updateColor(el) {
                            const value = el.value;

                            if (value === 'pending') { 
                                el.style.backgroundColor = '#fef3c7'; 
                                el.style.color = '#d97706'; 
                            }
                            else if (value === 'paid') { 
                                el.style.backgroundColor = '#dcfce7'; 
                                el.style.color = '#15803d'; 
                            }
                            else if (value === 'refunded') { 
                                el.style.backgroundColor = '#fee2e2'; 
                                el.style.color = '#991b1b'; 
                            }
                        }
                    </script>



                </div>
            </div>
            </main>
    </div>
